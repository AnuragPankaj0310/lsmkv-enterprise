# Nginx reverse proxy configuration
# Routes the single public port to the correct upstream:
#   /api/*  →  FastAPI (strips /api prefix)
#   /ws/*   →  FastAPI WebSocket (long-lived connections)
#   /*      →  React SPA (index.html for client-side routing)

upstream api {
    server lsmkv-enterprise-production.up.railway.app:443;
}

server {
    listen 80;
    server_name _;

    # -----------------------------------------------------------------
    # REST API — /api/* → FastAPI (prefix stripped)
    # -----------------------------------------------------------------
    location /api/ {
        proxy_pass https://lsmkv-enterprise-production.up.railway.app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------
    # WebSocket — /ws/* → FastAPI (long-lived, upgrade required)
    # proxy_read_timeout 3600 keeps metrics/log streams alive for 1 h.
    # -----------------------------------------------------------------
    location /ws/ {
        proxy_pass             https://lsmkv-enterprise-production.up.railway.app/ws/;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout     3600;
    }

    # -----------------------------------------------------------------
    # Health probe — delegated directly to FastAPI
    # Used by Docker healthcheck and cloud platform readiness probes.
    # -----------------------------------------------------------------
    location /health {
        proxy_pass https://lsmkv-enterprise-production.up.railway.app/health;
        proxy_set_header Host $host;
    }

    # -----------------------------------------------------------------
    # React SPA — serve static files, fall back to index.html
    # (supports client-side routing via React Router)
    # -----------------------------------------------------------------
    location / {
        root       /usr/share/nginx/html;
        try_files  $uri $uri/ /index.html;

        # Cache static assets aggressively; index.html must revalidate
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
        }
    }
}
